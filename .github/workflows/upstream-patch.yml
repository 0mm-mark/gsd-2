name: Upstream Patch Main and Tag

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["Upstream Synchronize"]
    types: [completed]

  push:
    branches: [sync]
    tags: ['**']  # React immediately when new tags appear upstream

  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pluggable-patches
  cancel-in-progress: false

jobs:
  apply-patches:  # ← Your original job — completely unchanged
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Switch to main and apply patches
        run: |
          set -x   # show every command for debugging

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy patches to /tmp while we are still on sync (guaranteed to exist)
          rm -rf /tmp/patches
          cp -rf patches /tmp/patches

          echo "=== Patches copied to /tmp ==="
          ls -la /tmp/patches

          # Switch to main (the branch we actually want to patch)
          git checkout main

          echo "=== Before cleanup on main ==="
          ls -la patches/ 2>/dev/null || echo "No patches/ on main"

          # Guarantee completely clean main (eliminates race with upstream sync)
          git fetch origin main
          git reset --hard origin/main

          # Remove any stale patches/ and copy from temp
          rm -rf patches/
          cp -rf /tmp/patches ./patches

          echo "=== After copying patches to main ==="
          ls -la patches/

          # Apply the feature patch
          git am --3way --ignore-whitespace patches/pluggable-orchestrator.patch || {
            echo "::error::Feature patch failed to apply."
            git am --abort
            exit 1
          }

          # Force .mcp.json override
          cp -f patches/mcp.json .mcp.json
          git add .mcp.json
          git commit -m "chore: force .mcp.json override from patch (always wins)" || true

          # Safe push (prevents overwriting someone else's push)
          git push --force-with-lease origin main

  apply-patches-to-latest-tag:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Apply patches to most recent tag (idempotent)
        run: |
          set -x   # show every command for debugging

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy patches to /tmp while we are still on sync
          rm -rf /tmp/patches
          cp -rf patches /tmp/patches

          echo "=== Patches copied to /tmp ==="
          ls -la /tmp/patches

          # Fetch all tags (and prune deleted ones)
          git fetch origin --tags --force --prune

          # Determine the most recent tag (version-sort descending)
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found in the repository. Skipping tag-based patching."
            exit 0
          fi
          echo "=== Most recent tag: $LATEST_TAG ==="

          # Target branch that always tracks "latest upstream tag + patches"
          TARGET_BRANCH="pluggable-latest"

          # Guarantee completely clean base at the chosen tag
          git checkout -B "$TARGET_BRANCH" "$LATEST_TAG"

          echo "=== Before cleanup on $TARGET_BRANCH ==="
          ls -la patches/ 2>/dev/null || echo "No patches/ dir"

          # Remove any stale patches/ and copy fresh ones from temp
          rm -rf patches/
          cp -rf /tmp/patches ./patches

          echo "=== After copying patches ==="
          ls -la patches/

          # Apply the feature patch (identical logic to main job)
          git am --3way --ignore-whitespace patches/pluggable-orchestrator.patch || {
            echo "::error::Feature patch failed to apply on tag $LATEST_TAG."
            git am --abort
            exit 1
          }

          # Force .mcp.json override (safe if file is missing on older tags)
          if [ -f patches/mcp.json ]; then
            cp -f patches/mcp.json .mcp.json
            git add .mcp.json
            git commit -m "chore: force .mcp.json override from patch (always wins)" || true
          fi

          # Safe push (idempotent — same result produces no change)
          git push --force-with-lease origin "$TARGET_BRANCH"

          echo "=== Successfully applied patches to $LATEST_TAG and updated $TARGET_BRANCH ==="

  create-patched-e-tag:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Apply patches to latest upstream tag and create vX.Y.Ze tag
        run: |
          set -x   # show every command for debugging

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy patches to /tmp while we are still on sync
          rm -rf /tmp/patches
          cp -rf patches /tmp/patches

          echo "=== Patches copied to /tmp ==="
          ls -la /tmp/patches

          # Fetch all tags (and prune deleted ones)
          git fetch origin --tags --force --prune

          # Determine the most recent *upstream* tag (exclude our own patched *e tags)
          LATEST_TAG=$(git tag --sort=-v:refname | grep -v 'e$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No upstream tags found (or all were patched). Skipping."
            exit 0
          fi
          echo "=== Most recent upstream tag: $LATEST_TAG ==="

          PATCHED_TAG="${LATEST_TAG}e"
          echo "=== Target patched tag: $PATCHED_TAG ==="

          # Idempotency check against REMOTE (most robust — survives any local state)
          if git ls-remote --tags origin | grep -q "refs/tags/${PATCHED_TAG}$"; then
            echo "=== Patched tag $PATCHED_TAG already exists remotely. Skipping (idempotent). ==="
            exit 0
          fi

          # Work on a clean detached HEAD at the exact upstream tag commit
          git checkout --detach "$LATEST_TAG"

          echo "=== Before cleanup on detached HEAD ==="
          ls -la patches/ 2>/dev/null || echo "No patches/ dir"

          # Remove any stale patches/ and copy fresh ones from temp
          rm -rf patches/
          cp -rf /tmp/patches ./patches

          echo "=== After copying patches ==="
          ls -la patches/

          # Apply the feature patch (identical logic to your other jobs)
          git am --3way --ignore-whitespace patches/pluggable-orchestrator.patch || {
            echo "::error::Feature patch failed to apply on tag $LATEST_TAG."
            git am --abort
            exit 1
          }

          # Force .mcp.json override (safe if file is missing on older tags)
          if [ -f patches/mcp.json ]; then
            cp -f patches/mcp.json .mcp.json
            git add .mcp.json
            git commit -m "chore: force .mcp.json override from patch (always wins)" || true
          fi

          # Create annotated tag with clear provenance
          git tag -a "$PATCHED_TAG" \
            -m "Upstream $LATEST_TAG + pluggable orchestrator patch (experimental features via patches/ from sync branch)" \
            || { echo "::error::Failed to create tag $PATCHED_TAG"; exit 1; }

          # Safe push of the new tag
          git push origin "$PATCHED_TAG"

          echo "=== Successfully created patched tag $PATCHED_TAG from $LATEST_TAG ==="

  sync-experimental-branch:
    needs: create-patched-e-tag
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Merge latest patched e-tag into experimental branch (auto-resolve src/experimental/ + .mcp.json)
        run: |
          set -x   # show every command for debugging

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch everything including all tags
          git fetch origin --tags --force --prune

          # Find the most recent *patched* tag (ends with e, version-sorted)
          LATEST_E_TAG=$(git tag --sort=-v:refname | grep -E 'e$' | head -n 1)
          if [ -z "$LATEST_E_TAG" ]; then
            echo "No patched e-tag found yet. Skipping."
            exit 0
          fi
          echo "=== Latest patched tag: $LATEST_E_TAG ==="

          # Switch to (or create) experimental branch
          git checkout -B experimental origin/experimental 2>/dev/null || git checkout -B experimental "$LATEST_E_TAG"

          # Idempotency: if experimental is already at or ahead of the latest e-tag, skip
          if git merge-base --is-ancestor "$LATEST_E_TAG" HEAD; then
            echo "=== experimental branch is already up-to-date with $LATEST_E_TAG. Skipping (idempotent). ==="
            exit 0
          fi

          echo "=== Merging $LATEST_E_TAG into experimental (auto-resolve src/experimental/ + .mcp.json) ==="

          # Attempt the merge
          if git merge --no-ff --no-edit "$LATEST_E_TAG"; then
            echo "=== Clean merge completed (no conflicts) ==="
          else
            echo "=== Merge produced conflicts. Auto-resolving allowed files ==="

            # Find all conflicted (unmerged) files
            CONFLICTED_FILES=$(git ls-files -u | awk '{print $4}' | sort -u || true)

            if [ -z "$CONFLICTED_FILES" ]; then
              echo "No conflicted files detected (Git state may be inconsistent). Aborting."
              exit 1
            fi

            AUTO_RESOLVED=0
            HAD_DISALLOWED_CONFLICT=0
            for file in $CONFLICTED_FILES; do
              if [[ "$file" == src/experimental/* || "$file" == .mcp.json ]]; then
                if [[ "$file" == .mcp.json ]]; then
                  echo "→ Auto-resolving $file (patched e-tag version wins - 'always wins' policy)"
                  git checkout --theirs -- "$file"
                else
                  echo "→ Auto-resolving $file (experimental branch wins)"
                  git checkout --ours -- "$file"
                fi
                git add "$file"
                ((AUTO_RESOLVED++))
              else
                echo "→ Leaving conflict in $file (outside allowed files - requires manual review)"
                HAD_DISALLOWED_CONFLICT=1
              fi
            done

            echo "=== Debug: current status after resolution ==="
            git status --porcelain

            # Check for any disallowed conflicts
            if [ "$HAD_DISALLOWED_CONFLICT" -eq 1 ]; then
              echo "::error::Unresolved merge conflicts remain outside allowed files. Manual resolution required."
              echo "Conflicted files: $(git diff --name-only --diff-filter=U | tr '\n' ' ')"
              exit 1
            fi

            echo "=== Successfully auto-resolved $AUTO_RESOLVED conflict(s) ==="

            # Complete the merge commit
            git commit --no-edit || {
              echo "::error::Failed to commit the auto-resolved merge."
              exit 1
            }
          fi

          # Safe push (never force on a dev branch)
          git push origin experimental

          echo "=== Successfully updated experimental branch with $LATEST_E_TAG ==="
