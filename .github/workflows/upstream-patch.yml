name: Apply pluggable orchestrator patches to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["Upstream Synchronize"]
    types: [completed]

  push:
    branches: [sync]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pluggable-patches
  cancel-in-progress: false

jobs:
  apply-patches:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Switch to main and apply patches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Current branch ==="
          git branch --show-current

          # Copy patches to a safe temporary location while still on sync
          rm -rf /tmp/patches
          cp -r patches /tmp/patches

          echo "=== Copied patches to /tmp ==="
          ls -la /tmp/patches

          # Switch to main
          git checkout main

          echo "=== Before cleanup on main ==="
          ls -la patches/ 2>/dev/null || echo "No patches/ on main"

          # Remove any stale patches/ on main
          rm -rf patches/

          # Copy from temp location
          cp -r /tmp/patches ./patches

          echo "=== After copying patches to main ==="
          ls -la patches/

          # Apply the feature patch
          git am --3way --ignore-whitespace patches/pluggable-orchestrator.patch || {
            echo "::error::Feature patch failed to apply."
            git am --abort
            exit 1
          }

          # Force .mcp.json override
          cp patches/mcp.json .mcp.json
          git add .mcp.json
          git commit -m "chore: force .mcp.json override from patch (always wins)" || true

          # Push
          git push origin main
