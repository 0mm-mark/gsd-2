name: Apply pluggable orchestrator patches to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["Upstream Synchronize"]
    types: [completed]

  push:
    branches: [sync]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pluggable-patches
  cancel-in-progress: false

jobs:
  apply-patches:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch (contains patches/)
        uses: actions/checkout@v4
        with:
          ref: sync
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Switch to main and prepare patches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Current branch and files ==="
          git branch --show-current
          ls -la patches/ || echo "patches/ not found!"

          # Bring patches/ into the main branch's working tree
          git checkout main
          git checkout sync -- patches/

          echo "=== After bringing patches from sync ==="
          ls -la patches/

          # Apply the feature patch
          git am --3way --ignore-whitespace patches/pluggable-orchestrator.patch || {
            echo "::error::Feature patch failed to apply."
            git am --abort
            exit 1
          }

          # Force .mcp.json
          cp patches/mcp.json .mcp.json
          git add .mcp.json
          git commit -m "chore: force .mcp.json override from patch (always wins)" || true

          # Push
          git push origin main
